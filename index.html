<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaturaTech LAC — Innovación & Naturaleza</title>
  <meta name="description" content="Somos una iniciativa que articula innovación sistémica para la naturaleza en América Latina y el Caribe. Enraizamos posibilidades." />
  <meta name="theme-color" content="#101511" />
  <link rel="icon" type="image/svg+xml" href="/assets/images/logo.svg" />
  <style>
    html, body { margin: 0; background: #101511; }
    #boot-loader {
      position: fixed; inset: 0; z-index: 99999;
      background: radial-gradient(circle at center, rgba(160, 200, 40, 0.12) 0%, #101511 70%);
      display: flex; align-items: center; justify-content: center;
      opacity: 1;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #boot-loader.is-hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }
    #boot-loader .ring-wrap { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
    #boot-loader img { width: 48px; height: 44px; }
    #boot-loader svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    #boot-loader circle { fill: none; stroke-width: 2; stroke-linecap: round; }
    #boot-loader .ring-bg { stroke: rgba(255,255,255,0.08); }
    #boot-loader .ring-progress {
      stroke: #C8E632;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      animation: ring-fill 1.6s ease-in-out forwards;
    }
    @keyframes ring-fill { to { stroke-dashoffset: 0; } }
  </style>
</head>
<body>
  <div id="boot-loader" aria-hidden="true">
    <div class="ring-wrap">
      <svg viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="45" />
        <circle class="ring-progress" cx="50" cy="50" r="45" />
      </svg>
      <img src="/assets/images/logo.svg" alt="NaturaTech LAC" />
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
